<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web前端技术</title>
<style>
  :root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --primary-light:#eef2ff;
    --accent:#10b981;
    --accent-light:#ecfdf5;
    --success:#10b981;
    --success-light:#d1fae5;
    --danger:#ef4444;
    --danger-light:#fee2e2;
    --warning:#f59e0b;
    --bg:#f0f4f9;
    --bg-soft:#f8f9fa;
    --card:#ffffff;
    --text:#1f1f1f;
    --text-muted:#444746;
    --text-light:#5f6368;
    --border:#f0f4f9;
    --border-light:#f8f9fa;
    --code-bg:#1e293b;
    --code-text:#e2e8f0;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 1px 3px rgba(0,0,0,.04),0 10px 26px -18px rgba(0,0,0,.16);
    --shadow-md:0 8px 24px -4px rgba(0,0,0,.10),0 4px 8px -2px rgba(0,0,0,.04);
    --shadow-lg:0 16px 40px -8px rgba(37,99,235,.18);
    --radius:14px;
    --radius-lg:16px;
    --fs-base:17px;
    --layout-max:1180px;
    --content-max:920px;
    --page-pad-x:24px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Google Sans","Product Sans",system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(180deg,#f0f4f9 0%,#e8eef5 50%,#f0f4f9 100%);
    background-attachment:fixed;
    color:var(--text);
    line-height:1.85;
    font-size:15px;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit}

  /* ============ 顶部导航 ============ */
  .topbar{
    position:sticky;top:0;z-index:60;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid var(--border);
    box-shadow:0 1px 12px -8px rgba(0,0,0,.18);
    padding:11px 0;
  }
  .topbar-shell{
    max-width:var(--layout-max);margin:0 auto;padding:0 var(--page-pad-x);
  }
  .topbar-inner{
    max-width:var(--content-max);margin:0 auto;padding:0;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .brand{
    font-size:17px;font-weight:800;letter-spacing:.3px;
    padding-left:12px;border-left:4px solid var(--primary);line-height:1.25;
    flex-shrink:0;
  }
  .brand h1{font-size:17px;font-weight:800;letter-spacing:.3px;line-height:1.25}
  .brand .sub{display:block;font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:0;margin-top:1px}
  .watermark{
    margin-left:auto;display:flex;align-items:center;justify-content:flex-end;
    gap:12px;min-width:0;flex-shrink:0;
  }
  .wm-line{
    height:1px;width:72px;flex:none;
    background:linear-gradient(90deg,transparent,#d2d2d2,transparent);
  }
  .wm-text{
    font-family:"Georgia","Times New Roman",serif;font-style:italic;
    font-size:18px;font-weight:700;letter-spacing:1.5px;
    background:linear-gradient(90deg,#7c3aed,#2563eb,#10b981);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 1px 6px rgba(37,99,235,.22));
    opacity:.82;white-space:nowrap;
  }
  .topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
  .timer{
    background:linear-gradient(135deg,rgba(90,145,247,.1),rgba(169,138,214,.1));
    color:#1a73e8;
    padding:7px 14px;border-radius:99px;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;
    display:none;border:1px solid #d3e3fd;
  }
  .timer.show{display:inline-flex;align-items:center;gap:6px}
  .btn-ghost-light{
    background:#fff;color:#1f1f1f;
    border:1px solid #e8eaed;
    padding:8px 18px;border-radius:99px;cursor:pointer;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:13px;font-weight:500;transition:all .18s ease;
    text-decoration:none;display:inline-flex;align-items:center;
  }
  .btn-ghost-light:hover{border-color:#5a91f7;color:#5a91f7;background:#f8fbff;box-shadow:0 2px 8px rgba(90,145,247,.12)}

  /* ============ 主体容器 ============ */
  main{max-width:var(--layout-max);margin:0 auto;padding:32px var(--page-pad-x) 140px;min-height:calc(100vh - 80px)}

  /* ============ 首页 ============ */
  .single-col{max-width:var(--content-max);margin:0 auto;padding-top:8px}

  .home-wrap{display:flex;flex-direction:column;gap:20px}

  /* 顶部介绍 — Gemini 渐变 banner */
  .home-banner{
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 50%,#e88a94 100%);
    border-radius:32px;
    padding:64px 56px 56px;position:relative;overflow:hidden;
    box-shadow:0 8px 32px rgba(66,133,244,.22);
    color:#fff;
  }
  .home-banner::before{
    content:"";position:absolute;top:-150px;right:-80px;width:380px;height:380px;
    background:radial-gradient(circle,rgba(255,255,255,.22) 0%,transparent 60%);
    pointer-events:none;
  }
  .home-banner::after{
    content:"";position:absolute;bottom:-180px;left:-60px;width:340px;height:340px;
    background:radial-gradient(circle,rgba(255,255,255,.15) 0%,transparent 60%);
    pointer-events:none;
  }
  .home-banner > *{position:relative}
  .home-badge{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;font-weight:500;letter-spacing:.2px;
    color:#fff;background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.25);
    padding:8px 18px;border-radius:99px;margin-bottom:28px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .home-badge .spark{
    width:16px;height:16px;background:#fff;
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2 L13.5 9 L20 11 L13.5 13 L12 22 L10.5 13 L4 11 L10.5 9 Z'/></svg>") center/contain no-repeat;
            mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2 L13.5 9 L20 11 L13.5 13 L12 22 L10.5 13 L4 11 L10.5 9 Z'/></svg>") center/contain no-repeat;
  }
  .home-banner h2{
    font-family:"Google Sans","Product Sans",system-ui,sans-serif;
    font-size:38px;font-weight:500;color:#fff;
    margin-bottom:18px;letter-spacing:-.8px;line-height:1.2;
  }
  .home-banner h2 .light{font-weight:400;opacity:.92}
  .home-banner p{
    color:rgba(255,255,255,.92);font-size:16px;line-height:1.7;
    max-width:620px;margin:0;font-weight:400;
  }
  .home-banner p b{font-weight:500;color:#fff;background:rgba(255,255,255,.18);padding:1px 10px;border-radius:8px}

  /* 题库统计 — 柔和渐变卡片 */
  .bank-stats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  }
  .bank-stat{
    border-radius:24px;padding:24px 22px;
    display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;
    transition:transform .25s ease,box-shadow .25s ease;
    color:#fff;min-height:140px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
  }
  .bank-stat::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 100% 0%,rgba(255,255,255,.25),transparent 55%);
    pointer-events:none;
  }
  .bank-stat::after{
    content:"";position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;border-radius:50%;
    background:rgba(255,255,255,.10);pointer-events:none;
  }
  .bank-stat:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.18)}
  .bank-stat.empty{opacity:.65}
  .bank-stat--choice{background:linear-gradient(135deg,#5a91f7 0%,#7daaff 60%,#a0c2f9 100%)}
  .bank-stat--judge{background:linear-gradient(135deg,#f5a91a 0%,#fbb820 60%,#fcc84f 100%)}
  .bank-stat--fill{background:linear-gradient(135deg,#2ba35c 0%,#4caf6e 60%,#7cc78d 100%)}
  .bank-stat--code{background:linear-gradient(135deg,#a98ad6 0%,#b25cf7 60%,#c4a0f5 100%)}
  .bank-stat .bs-name{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:17px;font-weight:500;letter-spacing:.3px;
    margin-bottom:auto;position:relative;
  }
  .bank-stat .bs-num{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:44px;font-weight:400;line-height:1;
    font-variant-numeric:tabular-nums;letter-spacing:-2px;
    position:relative;
  }
  .bank-stat .bs-unit{font-size:15px;font-weight:400;margin-left:6px;letter-spacing:0;opacity:.85}

  /* 试卷结构卡片 */
  .paper-card{
    background:#fff;border-radius:28px;
    border:1px solid rgba(66,133,244,.08);overflow:hidden;
    box-shadow:0 4px 16px rgba(66,133,244,.06);
  }
  .paper-card-head{
    padding:26px 32px 18px;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:18px;font-weight:500;color:#1f1f1f;
    border-bottom:1px solid #f0f4f9;
    display:flex;align-items:center;gap:12px;
  }
  .paper-card-head .h-icon{
    width:28px;height:28px;border-radius:50%;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 50%,#e88a94 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:14px;
    box-shadow:0 2px 8px rgba(155,114,203,.25);
  }
  .paper-items{padding:8px 16px}
  .paper-item{
    display:flex;align-items:center;gap:18px;
    padding:18px 16px;border-radius:16px;
    transition:background .15s ease;
  }
  .paper-item:hover{background:#f8f9fa}
  .paper-item + .paper-item{margin-top:2px}
  .paper-tag{
    flex-shrink:0;font-size:13px;font-weight:500;letter-spacing:.2px;
    padding:6px 14px;border-radius:99px;min-width:64px;text-align:center;
    color:#fff;
  }
  .paper-tag.choice{background:linear-gradient(135deg,#5a91f7,#7daaff)}
  .paper-tag.judge{background:linear-gradient(135deg,#f5a91a,#fcc84f)}
  .paper-tag.fill{background:linear-gradient(135deg,#4caf6e,#7cc78d)}
  .paper-tag.code{background:linear-gradient(135deg,#a98ad6,#c4a0f5)}
  .paper-item-body{flex:1;min-width:0}
  .paper-item-title{font-size:16px;font-weight:400;color:#1f1f1f;margin-bottom:4px}
  .paper-item-desc{font-size:13px;color:#444746}
  .paper-item-desc b{font-weight:500;color:#1f1f1f}
  .paper-item.disabled{opacity:.55}
  .paper-item.disabled .type-slider{pointer-events:none;opacity:.45}
  .paper-item-foot{
    margin-top:14px;padding-top:14px;border-top:1px dashed #eef2f7;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .paper-item-meta{font-size:13px;color:#444746;line-height:1.6}
  .paper-item-meta em{
    font-style:normal;font-weight:500;color:#1f1f1f;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  }
  .start-type-btn{
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 50%,#e88a94 100%);
    color:#fff;border:none;padding:10px 22px;border-radius:99px;
    font-family:"Google Sans",system-ui,sans-serif;font-size:14px;font-weight:500;
    cursor:pointer;transition:all .25s ease;white-space:nowrap;
    box-shadow:0 4px 14px rgba(155,114,203,.25);
  }
  .start-type-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(155,114,203,.35)}
  .start-type-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  .type-slider-row{margin-top:12px;display:flex;align-items:center;gap:14px}
  .type-slider-track{flex:1;position:relative;height:28px;display:flex;align-items:center}
  .type-slider{
    width:100%;height:6px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(90deg,#5a91f7 var(--pct,0%),#e8eaed var(--pct,0%));
    border-radius:99px;outline:none;cursor:pointer;margin:0;
  }
  .type-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#fff;border:2px solid #5a91f7;box-shadow:0 2px 8px rgba(90,145,247,.35);cursor:pointer;
  }
  .type-slider::-moz-range-thumb{
    width:18px;height:18px;border-radius:50%;
    background:#fff;border:2px solid #5a91f7;box-shadow:0 2px 8px rgba(90,145,247,.35);cursor:pointer;
  }
  .type-slider--judge{background:linear-gradient(90deg,#f5a91a var(--pct,0%),#e8eaed var(--pct,0%))}
  .type-slider--judge::-webkit-slider-thumb{border-color:#f5a91a;box-shadow:0 2px 8px rgba(245,169,26,.35)}
  .type-slider--judge::-moz-range-thumb{border-color:#f5a91a;box-shadow:0 2px 8px rgba(245,169,26,.35)}
  .type-slider--fill{background:linear-gradient(90deg,#4caf6e var(--pct,0%),#e8eaed var(--pct,0%))}
  .type-slider--fill::-webkit-slider-thumb{border-color:#4caf6e;box-shadow:0 2px 8px rgba(76,175,110,.35)}
  .type-slider--fill::-moz-range-thumb{border-color:#4caf6e;box-shadow:0 2px 8px rgba(76,175,110,.35)}
  .type-slider--code{background:linear-gradient(90deg,#a98ad6 var(--pct,0%),#e8eaed var(--pct,0%))}
  .type-slider--code::-webkit-slider-thumb{border-color:#a98ad6;box-shadow:0 2px 8px rgba(169,138,214,.35)}
  .type-slider--code::-moz-range-thumb{border-color:#a98ad6;box-shadow:0 2px 8px rgba(169,138,214,.35)}
  .type-slider-val{
    flex-shrink:0;min-width:52px;text-align:right;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:15px;font-weight:500;color:#1f1f1f;font-variant-numeric:tabular-nums;
  }
  .paper-item-score{
    flex-shrink:0;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:22px;font-weight:500;
    font-variant-numeric:tabular-nums;letter-spacing:-.5px;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  }
  .paper-item-score small{font-size:13px;font-weight:400;color:#444746;margin-left:3px;letter-spacing:0;
    -webkit-text-fill-color:#444746;background:none;}

  .paper-footer{
    padding:24px 32px;
    background:linear-gradient(135deg,rgba(66,133,244,.06) 0%,rgba(155,114,203,.06) 50%,rgba(217,101,112,.06) 100%);
    border-top:1px solid #f0f4f9;
    display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .paper-total-info .pt-label{font-size:13px;color:#444746;margin-bottom:6px;font-weight:400}
  .paper-total-info .pt-val{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:22px;font-weight:400;color:#1f1f1f;letter-spacing:-.3px;
  }
  .paper-total-info .pt-val em{
    font-style:normal;font-weight:500;margin:0 3px;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  }

  .start-btn{
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 50%,#e88a94 100%);
    background-size:200% 100%;background-position:0% 50%;
    color:#fff;border:none;
    padding:14px 36px;border-radius:99px;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:15px;font-weight:500;cursor:pointer;transition:all .35s ease;
    box-shadow:0 6px 20px rgba(155,114,203,.3);
    display:inline-flex;align-items:center;gap:10px;white-space:nowrap;
  }
  .start-btn:hover{
    background-position:100% 50%;
    box-shadow:0 10px 28px rgba(217,101,112,.35);transform:translateY(-2px);
  }
  .start-btn:active{transform:translateY(0)}
  .start-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:0 4px 12px rgba(155,114,203,.15)}
  .start-btn:disabled:hover{background-position:0% 50%;transform:none}
  .start-btn .arrow{font-size:18px;line-height:1;transition:transform .2s ease}
  .start-btn:hover .arrow{transform:translateX(4px)}

  @media(max-width:640px){
    .bank-stats{grid-template-columns:repeat(2,1fr)}
    .home-banner{padding:40px 24px 32px;border-radius:24px}
    .home-banner h2{font-size:28px}
    .paper-card-head{padding:22px 20px 16px}
    .paper-footer{padding:20px;flex-direction:column;align-items:stretch}
    .start-btn{width:100%;justify-content:center}
  }
  @media(max-width:400px){.bank-stats{grid-template-columns:1fr 1fr}}

  /* ============ 答题页 ============ */
  .exam-header{
    background:#fff;border-radius:24px;
    padding:20px 24px;margin-bottom:18px;
    border:1px solid #f0f4f9;
    box-shadow:0 4px 16px rgba(66,133,244,.06);
  }
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px}
  .progress-row .left{color:#444746;font-weight:400}
  .progress-row .left b{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:18px;font-weight:500;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
    margin:0 2px;
  }
  .progress-row .right{color:#5f6368}
  .progress-bar{
    height:10px;background:#eef2f7;border-radius:99px;overflow:hidden;position:relative;
  }
  .progress-bar-gradient{
    position:absolute;inset:0;
    background:linear-gradient(90deg,
      #5a91f7 0%,#7daaff 6.25%,#a98ad6 12.5%,#c4a0f5 18.75%,
      #e88a94 25%,#f5a91a 31.25%,#fcc84f 37.5%,#7cc78d 43.75%,
      #5a91f7 50%,#7daaff 56.25%,#a98ad6 62.5%,#c4a0f5 68.75%,
      #e88a94 75%,#f5a91a 81.25%,#fcc84f 87.5%,#7cc78d 93.75%,
      #5a91f7 100%);
    background-size:200% 100%;
    animation:gradFlow 16s linear infinite;
    will-change:background-position;
  }
  .progress-bar-cover{
    position:absolute;right:0;top:0;bottom:0;width:100%;
    background:#eef2f7;
    transition:width .55s cubic-bezier(.4,0,.2,1);
    -webkit-mask-image:linear-gradient(to right,transparent 0,#000 32px);
    mask-image:linear-gradient(to right,transparent 0,#000 32px);
  }
  @keyframes gradFlow{0%{background-position:0% 50%}100%{background-position:100% 50%}}
  .qnav{
    display:flex;gap:6px;overflow-x:auto;padding:14px 0 4px;
    margin-top:4px;scrollbar-width:thin;
  }
  .qnav::-webkit-scrollbar{height:4px}
  .qnav::-webkit-scrollbar-thumb{background:#e8eaed;border-radius:2px}
  .qnav-item{
    min-width:36px;height:36px;border-radius:12px;
    background:#f0f4f9;border:1px solid transparent;
    cursor:pointer;font-size:13px;font-weight:500;color:#5f6368;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:all .15s;
  }
  .qnav-item:hover{border-color:#5a91f7;background:#fff}
  .qnav-item.current{background:linear-gradient(135deg,#5a91f7,#a98ad6);color:#fff;transform:scale(1.08);box-shadow:0 4px 12px rgba(155,114,203,.3)}
  .qnav-item.answered{background:#e8f0fe;color:#1a73e8}
  .qnav-item.correct{background:#e6f4ea;color:#188038;border-color:#34a853}
  .qnav-item.wrong{background:#fce8e6;color:#d93025;border-color:#ea4335}

  /* ============ 两栏布局 ============ */
  .exam-layout{
    display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:stretch;
  }
  .left-col{
    min-width:0;display:flex;flex-direction:column;
  }
  .left-col .qcard{
    flex:1;margin-bottom:0;display:flex;flex-direction:column;
  }
  .right-col{
    position:sticky;top:72px;
    display:flex;flex-direction:column;
  }
  /* 答题卡面板 */
  .answer-panel{
    background:#fff;border-radius:24px;
    padding:20px;border:1px solid #f0f4f9;
    box-shadow:0 4px 16px rgba(66,133,244,.06);
    flex:1;display:flex;flex-direction:column;min-height:100%;
    overflow-y:auto;
  }
  .answer-panel::-webkit-scrollbar{width:6px}
  .answer-panel::-webkit-scrollbar-thumb{background:#e8eaed;border-radius:3px}
  .panel-section{margin-bottom:18px}
  .panel-section:last-of-type{margin-bottom:0}
  .panel-title{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;font-weight:500;color:#1f1f1f;
    padding:10px 14px;margin-bottom:12px;border-radius:14px;
    background:linear-gradient(135deg,rgba(90,145,247,.08) 0%,rgba(169,138,214,.08) 100%);
    display:flex;align-items:center;justify-content:space-between;
  }
  .panel-title .pt-score{font-size:12px;color:#5f6368;font-weight:500;background:#fff;padding:3px 10px;border-radius:99px;border:1px solid #f0f4f9}
  .panel-grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
  }
  .panel-cell{
    aspect-ratio:1;border:1px solid #e8eaed;border-radius:10px;
    background:#fff;color:#5a91f7;font-size:13px;font-weight:500;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .18s ease;user-select:none;
  }
  .panel-cell:hover{border-color:#5a91f7;transform:translateY(-1px);box-shadow:0 3px 8px rgba(90,145,247,.18)}
  .panel-cell.current{background:linear-gradient(135deg,#5a91f7,#a98ad6);color:#fff;border-color:transparent;transform:scale(1.05);box-shadow:0 4px 12px rgba(155,114,203,.3)}
  .panel-cell.answered{background:#e8f0fe;color:#1a73e8;border-color:#d3e3fd}
  .panel-cell.correct{background:#e6f4ea;color:#188038;border-color:#ceead6}
  .panel-cell.wrong{background:#fce8e6;color:#d93025;border-color:#fad2cf}
  .panel-cell.viewed{background:#fef7e0;color:#b06000;border-color:#feefc3}
  .panel-summary{
    margin-top:auto;padding:16px;background:#f8f9fa;border-radius:14px;
    font-size:12.5px;color:#5f6368;line-height:1.8;
  }
  .panel-summary .row{display:flex;justify-content:space-between;align-items:center}
  .panel-summary .row b{
    font-family:"Google Sans",system-ui,sans-serif;
    color:#1f1f1f;font-size:16px;font-weight:500;
  }
  .panel-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;color:#5f6368}
  .panel-legend .lg{display:flex;align-items:center;gap:4px}
  .panel-legend .box{width:12px;height:12px;border-radius:4px;border:1px solid}
  .panel-legend .box.answered{background:#e8f0fe;border-color:#d3e3fd}
  .panel-legend .box.current{background:linear-gradient(135deg,#5a91f7,#a98ad6);border-color:transparent}
  .panel-legend .box.unanswered{background:#fff;border-color:#e8eaed}
  .panel-submit{
    width:100%;margin-top:14px;flex-shrink:0;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);color:#fff;border:none;
    padding:13px;border-radius:99px;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;font-weight:500;cursor:pointer;transition:all .25s ease;
    box-shadow:0 4px 14px rgba(155,114,203,.3);
  }
  .panel-submit:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(155,114,203,.4)}
  @media(max-width:980px){
    .exam-layout{grid-template-columns:1fr;gap:16px}
    .right-col{position:static}
    .answer-panel{max-height:none}
  }

  /* ============ 题目卡片 ============ */
  .qcard{
    background:#fff;border-radius:24px;
    padding:32px 32px;margin-bottom:20px;
    border:1px solid #f0f4f9;
    box-shadow:0 4px 16px rgba(66,133,244,.06);
    animation:fadeIn .35s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .q-type-tag{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:12px;font-weight:500;padding:5px 14px;border-radius:99px;
  }
  .q-type-tag.choice{background:#e8f0fe;color:#1a73e8}
  .q-type-tag.judge{background:#fef7e0;color:#b06000}
  .q-type-tag.fill{background:#e6f4ea;color:#188038}
  .q-type-tag.code{background:#f3e8fd;color:#a142f4}
  .q-score{font-size:12px;color:#5f6368;font-weight:400}
  .q-num-big{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;color:#5f6368;margin-left:auto;font-weight:400;
  }
  .q-num-big b{
    font-size:24px;font-weight:500;margin:0 2px;
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  }
  .q-title{font-size:var(--fs-base);line-height:1.75;color:#1f1f1f;margin-bottom:24px;font-weight:400}
  .q-title code,.option code,.explain code,.review-item code{
    background:#e8f0fe;color:#1a73e8;padding:1px 7px;border-radius:6px;
    font-size:calc(var(--fs-base) - 3px);font-family:"SF Mono",Consolas,Monaco,monospace;white-space:nowrap;
  }
  .option code{font-size:calc(var(--fs-base) - 2px)}
  .fill-desc{color:#5f6368;font-size:calc(var(--fs-base) - 3px);line-height:1.7;margin-bottom:16px;font-weight:400}

  /* 选项 */
  .options{display:flex;flex-direction:column;gap:10px}
  .option{
    background:#fff;border:1px solid #e8eaed;border-radius:14px;
    padding:16px 18px;cursor:pointer;transition:all .2s ease;
    display:flex;align-items:center;gap:14px;font-size:calc(var(--fs-base) - 2px);
  }
  .option:hover{border-color:#5a91f7;background:#f8fbff;transform:translateX(2px);box-shadow:0 2px 8px rgba(90,145,247,.1)}
  .option .letter{
    background:#f0f4f9;color:#5f6368;
    width:32px;height:32px;border-radius:10px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:"Google Sans",system-ui,sans-serif;
    font-weight:500;font-size:14px;transition:all .18s;
  }
  .option.selected{border-color:#5a91f7;background:#e8f0fe;box-shadow:0 2px 8px rgba(90,145,247,.15)}
  .option.selected .letter{background:linear-gradient(135deg,#5a91f7,#a98ad6);color:#fff}
  .option.correct{border-color:#34a853;background:#e6f4ea}
  .option.correct .letter{background:#34a853;color:#fff}
  .option.wrong{border-color:#ea4335;background:#fce8e6}
  .option.wrong .letter{background:#ea4335;color:#fff}
  .option.disabled{cursor:default}
  .option.disabled:hover{transform:none;box-shadow:none}

  /* 判断按钮 */
  .judge-btns{display:flex;gap:14px}
  .judge-btn{
    flex:1;background:#fff;border:1px solid #e8eaed;border-radius:16px;
    padding:26px;cursor:pointer;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:calc(var(--fs-base) + 1px);font-weight:500;
    transition:all .2s ease;color:#5f6368;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .judge-btn .icon{font-size:32px;line-height:1}
  .judge-btn:hover{border-color:#5a91f7;background:#f8fbff;color:#1a73e8;box-shadow:0 4px 12px rgba(90,145,247,.1)}
  .judge-btn.selected{border-color:#5a91f7;background:#e8f0fe;color:#1a73e8}
  .judge-btn.selected .icon{background:linear-gradient(135deg,#5a91f7,#a98ad6);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
  .judge-btn.correct{border-color:#34a853;background:#e6f4ea;color:#188038}
  .judge-btn.wrong{border-color:#ea4335;background:#fce8e6;color:#d93025}
  .judge-btn.disabled{cursor:default}

  /* 填空 */
  pre.code-block{
    background:linear-gradient(135deg,#1e1b2e 0%,#2a2540 100%);color:#e2e8f0;
    padding:20px 22px;border-radius:16px;overflow-x:auto;
    font-family:"SF Mono",Consolas,Monaco,monospace;
    font-size:calc(var(--fs-base) - 3.5px);line-height:1.75;margin-bottom:18px;
    white-space:pre;border:1px solid rgba(155,114,203,.15);
  }
  pre.code-block .blank{color:#fbbf24;font-weight:600;background:rgba(251,191,36,.15);padding:0 6px;border-radius:5px}
  .fill-figures{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
  .fill-figure{
    margin:0;padding:14px;background:#f8f9fa;border:1px solid #e8eaed;border-radius:16px;
    text-align:center;
  }
  .fill-figure img{
    max-width:100%;height:auto;border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);background:#fff;
  }
  .fill-figure figcaption{
    margin-top:10px;font-size:12px;color:#5f6368;line-height:1.5;
    font-family:"Google Sans",system-ui,sans-serif;
  }
  .blank-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .blank-item{
    display:flex;align-items:center;gap:10px;
    background:#fff;border:1px solid #e8eaed;border-radius:12px;
    padding:9px 14px;transition:all .18s ease;
  }
  .blank-item:focus-within{border-color:#5a91f7;box-shadow:0 0 0 3px rgba(90,145,247,.15)}
  .blank-item .lab{font-size:12px;color:#5f6368;font-weight:500;white-space:nowrap;font-family:"Google Sans",system-ui,sans-serif}
  .blank-item input{
    border:none;outline:none;flex:1;font-size:calc(var(--fs-base) - 3px);
    font-family:"SF Mono",Consolas,Monaco,monospace;background:transparent;color:#1f1f1f;
  }
  .blank-item.ok{border-color:#34a853;background:#e6f4ea}
  .blank-item.no{border-color:#ea4335;background:#fce8e6}

  /* 编程题 */
  .code-q .req{
    background:linear-gradient(135deg,#e8f0fe,#f3e8fd);
    border-left:4px solid #5a91f7;padding:16px 20px;border-radius:14px;
    font-size:14px;color:#1f1f1f;margin-bottom:18px;line-height:1.8;
  }
  .code-q .req ol{padding-left:22px}
  .code-q .req ol li{margin:4px 0}
  .answer-toggle{
    background:linear-gradient(135deg,rgba(90,145,247,.08),rgba(169,138,214,.08));
    color:#1a73e8;border:1px solid #d3e3fd;border-radius:99px;padding:11px 22px;cursor:pointer;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;font-weight:500;transition:all .18s ease;
    display:inline-flex;align-items:center;gap:8px;
  }
  .answer-toggle:hover{background:linear-gradient(135deg,#5a91f7,#a98ad6);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(155,114,203,.25)}
  .answer-toggle .arrow{display:inline-block;transition:transform .25s}
  .answer-toggle.open .arrow{transform:rotate(180deg)}
  .code-answer{
    margin-top:16px;border:1px solid #f0f4f9;border-radius:16px;overflow:hidden;display:none;
    box-shadow:0 4px 16px rgba(66,133,244,.06);
  }
  .code-answer.show{display:block;animation:fadeIn .25s}
  .code-answer .head{background:#f8f9fa;padding:12px 20px;font-size:13px;color:#5f6368;font-weight:500;border-bottom:1px solid #f0f4f9;font-family:"Google Sans",system-ui,sans-serif}
  .code-answer .points{background:#fef7e0;padding:14px 20px;font-size:13px;color:#b06000;border-bottom:1px solid #feefc3;line-height:1.7}
  .code-answer .points b{font-weight:500}
  .code-answer pre{margin:0;border-radius:0}

  /* 编程题复习 */
  .code-review-banner{
    background:linear-gradient(135deg,#f3e8fd,#e8f0fe);
    border:1px solid rgba(169,138,214,.15);border-radius:20px;
    padding:20px 24px;margin-bottom:20px;
  }
  .code-review-banner h2{font-size:20px;font-weight:500;color:#1f1f1f;margin-bottom:6px}
  .code-review-banner p{font-size:14px;color:#444746;line-height:1.7}
  .code-review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .code-review-card{
    background:#fff;border:1px solid #f0f4f9;border-radius:18px;overflow:hidden;
    cursor:pointer;transition:all .2s ease;box-shadow:0 2px 10px rgba(0,0,0,.04);
  }
  .code-review-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(169,138,214,.15);border-color:#e8d4ff}
  .code-review-card img{width:100%;height:140px;object-fit:cover;object-position:top;background:#f8f9fa}
  .code-review-card .body{padding:14px 16px 16px}
  .code-review-card .idx{font-size:12px;color:#a142f4;font-weight:500;margin-bottom:4px}
  .code-review-card .name{font-size:15px;color:#1f1f1f;line-height:1.5}
  .code-review-fig{margin-bottom:18px;border:1px solid #f0f4f9;border-radius:16px;overflow:hidden;background:#fff}
  .code-review-fig img{width:100%;max-height:360px;object-fit:contain;background:#f8f9fa;display:block}
  .code-review-answer{margin-top:18px;border:1px solid #f0f4f9;border-radius:16px;overflow:hidden}
  .code-review-answer .head{background:#f8f9fa;padding:12px 20px;font-size:13px;color:#5f6368;font-weight:500;border-bottom:1px solid #f0f4f9}
  .paper-item--review .paper-item-foot{margin-top:10px;padding-top:12px}
  .start-review-btn{background:linear-gradient(135deg,#a98ad6,#c4a0f5)!important}

  /* 解析 */
  .explain{
    margin-top:22px;padding:18px 22px;border-radius:16px;
    font-size:calc(var(--fs-base) - 3px);line-height:1.8;display:none;
    border-left:4px solid;
  }
  .explain.show{display:block;animation:fadeIn .25s}
  .explain.ok{background:#e6f4ea;color:#0d652d;border-color:#34a853}
  .explain.no{background:#fce8e6;color:#a50e0e;border-color:#ea4335}
  .explain .tag{font-weight:500;margin-right:8px;font-family:"Google Sans",system-ui,sans-serif}

  /* ============ 底部操作栏 ============ */
  .bottom-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    border-top:1px solid #f0f4f9;padding:14px 18px;z-index:50;
    box-shadow:0 -4px 20px rgba(0,0,0,.04);
  }
  .bottom-inner{
    max-width:1180px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .nav-btns{display:flex;gap:10px}
  .nav-btn{
    background:#fff;border:1px solid #e8eaed;border-radius:99px;
    padding:11px 22px;cursor:pointer;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;font-weight:500;color:#1f1f1f;
    transition:all .18s ease;display:inline-flex;align-items:center;gap:6px;
  }
  .nav-btn:hover:not(:disabled){border-color:#5a91f7;color:#5a91f7;background:#f8fbff;box-shadow:0 2px 8px rgba(90,145,247,.12)}
  .nav-btn:disabled{opacity:.4;cursor:not-allowed}
  .submit-btn{
    background:linear-gradient(135deg,#5a91f7 0%,#a98ad6 100%);color:#fff;border:none;
    padding:12px 30px;border-radius:99px;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:14px;font-weight:500;cursor:pointer;transition:all .25s ease;
    box-shadow:0 4px 14px rgba(155,114,203,.3);
  }
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(155,114,203,.4)}

  /* ============ 结果页 ============ */
  .result-hero{
    background:#fff;
    border-radius:32px;padding:56px 40px;text-align:center;
    box-shadow:0 4px 24px rgba(66,133,244,.08);margin-bottom:22px;
    border:1px solid #f0f4f9;position:relative;overflow:hidden;
  }
  .result-hero::before{
    content:"";position:absolute;top:-120px;right:-80px;width:300px;height:300px;
    background:radial-gradient(circle,rgba(90,145,247,.10) 0%,transparent 65%);
    pointer-events:none;
  }
  .result-hero.fail::before{background:radial-gradient(circle,rgba(234,67,53,.10) 0%,transparent 65%)}
  .result-hero > *{position:relative}
  .result-hero.fail{background:#fff}
  .result-hero .score-ring{
    width:170px;height:170px;border-radius:50%;
    background:conic-gradient(135deg,#5a91f7,#34a853,#fbbc04,#ea4335);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
  }
  .result-hero.fail .score-ring{background:conic-gradient(135deg,#ea4335,#fbbc04,#ea4335)}
  .score-ring::before{
    content:"";position:absolute;inset:12px;border-radius:50%;background:#fff;
  }
  .score-ring .num{
    position:relative;
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:46px;font-weight:500;color:#1f1f1f;letter-spacing:-1.5px;
  }
  .result-hero h2{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:24px;margin-bottom:10px;color:#1f1f1f;font-weight:500;
  }
  .result-hero .tip{color:#5f6368;font-size:14px;margin-bottom:28px;font-weight:400}
  .result-stats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:580px;margin:0 auto 30px;
  }
  .result-stat{
    background:#f8f9fa;border:1px solid #f0f4f9;border-radius:14px;padding:16px 10px;
    transition:transform .18s ease,box-shadow .18s ease;
  }
  .result-stat:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .result-stat .n{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:22px;font-weight:500;color:#1f1f1f;line-height:1;
  }
  .result-stat .l{font-size:12px;color:#5f6368;margin-top:6px;font-weight:400}
  .result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  @media(max-width:560px){.result-stats{grid-template-columns:repeat(2,1fr)}}

  /* 错题回顾 */
  .review-section{
    background:#fff;border-radius:24px;padding:30px 32px;
    box-shadow:0 4px 16px rgba(66,133,244,.06);border:1px solid #f0f4f9;
  }
  .review-section h3{
    font-family:"Google Sans",system-ui,sans-serif;
    font-size:18px;font-weight:500;color:#1f1f1f;margin-bottom:20px;
    display:flex;align-items:center;gap:10px;
  }
  .review-section h3::before{
    content:"";width:6px;height:22px;border-radius:99px;
    background:linear-gradient(180deg,#ea4335,#fbbc04);
  }
  .review-item{
    padding:20px;background:linear-gradient(135deg,#fce8e6 0%,#fff5f5 100%);
    border:1px solid #fad2cf;border-radius:16px;
    margin-bottom:14px;
  }
  .review-item:last-child{margin-bottom:0}
  .review-item .ri-head{display:flex;gap:10px;align-items:center;margin-bottom:12px;font-size:13px}
  .review-item .ri-head .t{font-weight:500;color:#d93025;font-family:"Google Sans",system-ui,sans-serif}
  .review-qcard{
    background:#fff;border:1px solid #f0f4f9;border-radius:16px;
    padding:20px 22px;margin-top:4px;box-shadow:none;
  }
  .review-qcard .q-title{margin-top:0}
  .review-qcard .explain-detail{margin-top:10px;line-height:1.65;color:#444746}

  /* 隐藏 */
  .hidden{display:none!important}

  /* 滚动条 */
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text-light)}

  /* 响应式 */
  @media(max-width:760px){
    .wm-line{display:none}
    .wm-text{font-size:15px;letter-spacing:1px}
    .watermark{order:3;width:100%;justify-content:flex-end;padding:4px 0 0}
  }
  @media(max-width:640px){
    :root{--page-pad-x:14px}
    main{padding:20px var(--page-pad-x) 130px}
    .home-banner,.paper-card,.qcard,.exam-header,.result-hero,.review-section{padding:24px 20px}
    .option{padding:12px 14px}
    .judge-btn{padding:18px}
    .config-row{grid-template-columns:1fr;gap:8px}
    .config-row .val{justify-self:start}
    .bottom-inner{flex-direction:column;align-items:stretch;gap:10px}
    .nav-btns{justify-content:space-between}
    .submit-btn{width:100%}
  }
</style>
</head>

<header class="topbar">
  <div class="topbar-shell">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Web 前端技术 · 题库随机测试</h1>
        <span class="sub">郑州轻工业大学 · 移动软件 2025 级</span>
      </div>
      <div class="watermark"><span class="wm-line"></span><span class="wm-text">Made by MoQix26</span><span class="wm-line"></span></div>
      <div class="topbar-actions">
        <a class="btn-ghost-light" href="next.html">复习大纲</a>
        <div class="timer" id="timer">⏱ <span id="timerText">00:00</span></div>
        <button class="btn-ghost-light" id="btnHome">返回首页</button>
      </div>
    </div>
  </div>
</header>

<main id="app"></main>

<div class="bottom-bar hidden" id="bottomBar">
  <div class="bottom-inner">
    <div class="nav-btns">
      <button class="nav-btn" id="btnPrev">← 上一题</button>
      <button class="nav-btn" id="btnNext">下一题 →</button>
    </div>
    <button class="submit-btn" id="btnSubmit">交卷评分</button>
  </div>
</div>

<script src="choice.js"></script>
<script src="judge.js"></script>
<script src="fill.js"></script>
<script src="code.js"></script>
<script>
/* ===================== 题库 ===================== */
const BANK = {
  choice: CHOICE_BANK,
  judge: JUDGE_BANK,
  fill: FILL_BANK,
  code: CODE_BANK
};

/* ===================== 抽题工具 ===================== */
function sample(arr,n){
  const a=[...arr],r=[];
  while(r.length<n && a.length){
    const i=Math.floor(Math.random()*a.length);
    r.push(a.splice(i,1)[0]);
  }
  return r;
}
function norm(s){return String(s||'').trim().toLowerCase().replace(/['"`]/g,'')}
function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
// 题干/解析：转义后把 <xxx> 高亮为 <code>（选项请用 fmtOption，避免同题选项样式不一致）
function fmtText(s){
  s = escapeHtml(s);
  return s.replace(/&lt;!--[\s\S]*?--&gt;/g, m => `<code>${m}</code>`)
          .replace(/&lt;.*?&gt;/g, m => `<code>${m}</code>`);
}
function fmtOption(s){ return escapeHtml(s); }

/** 填空题配图：支持 img 字符串或 imgs 数组 [{src, alt?, caption?}] */
function renderFillFigures(q){
  const list = q.imgs || (q.img ? [{ src: q.img, alt: q.imgAlt || q.title || '题目配图', caption: q.imgCaption }] : []);
  if(!list.length) return '';
  return `<div class="fill-figures">${list.map(im => {
    const src = escapeHtml(im.src || '');
    const alt = escapeHtml(im.alt || '题目配图');
    const cap = im.caption ? `<figcaption>${escapeHtml(im.caption)}</figcaption>` : '';
    return `<figure class="fill-figure"><img src="${src}" alt="${alt}" loading="lazy">${cap}</figure>`;
  }).join('')}</div>`;
}

const SCROLL_MS = 850;
function smoothScrollToTop(duration = SCROLL_MS){
  const start = window.scrollY || document.documentElement.scrollTop;
  if(start <= 0) return;
  const t0 = performance.now();
  const step = now => {
    const p = Math.min(1, (now - t0) / duration);
    const ease = 1 - Math.pow(1 - p, 3);
    window.scrollTo(0, start * (1 - ease));
    if(p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

/* ===================== 状态 ===================== */
const TYPE_DEFS = [
  { key:'choice', label:'单选题', tag:'选择', section:'一、单选题' },
  { key:'judge',  label:'判断题', tag:'判断', section:'二、判断题' },
  { key:'fill',   label:'填空题', tag:'填空', section:'三、填空题' }
];
const EXAM_TYPES = TYPE_DEFS;
let pageMode = 'home'; // home | exam | codeReview
let codeReviewIdx = 0;
let cfg = {
  choice: Math.min(30, CHOICE_BANK?.length || 0),
  judge: Math.min(20, JUDGE_BANK?.length || 0),
  fill: Math.min(3, FILL_BANK?.length || 0)
};
let exam = null;
let currentIdx = 0;
let timerId = null, seconds = 0;

function fmtScore(n){
  if(!Number.isFinite(n)) return '0';
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}
function setSliderFill(el, rawValue){
  const max = +el.max || 0;
  const v = rawValue != null ? rawValue : +el.value;
  const pct = max ? (v / max * 100) : 0;
  el.style.setProperty('--pct', pct + '%');
}
function snapSlider(el){
  const max = +el.max || 0;
  let n = Math.round(+el.value);
  n = Math.max(0, Math.min(max, n));
  el.value = n;
  return n;
}
function nearestCount(el){
  const max = +el.max || 0;
  if(!max) return 0;
  return Math.max(0, Math.min(max, Math.round(+el.value)));
}
function updateTypeCard(type){
  const max = BANK[type]?.length || 0;
  const n = cfg[type] || 0;
  const per = n ? fmtScore(100 / n) : '—';
  document.querySelectorAll(`.cfg-count[data-type="${type}"]`).forEach(el => { el.textContent = n; });
  const perEl = document.querySelector(`.type-summary-per[data-type="${type}"]`);
  const btn = document.querySelector(`.start-type-btn[data-type="${type}"]`);
  if(perEl) perEl.textContent = per;
  if(btn){
    btn.disabled = n === 0;
    btn.title = n === 0 ? '请拖动滑块选择至少 1 题' : '';
  }
}
function bindTypeSlider(el){
  const type = el.dataset.type;
  const sync = (snap) => {
    if(snap) cfg[type] = snapSlider(el);
    else cfg[type] = nearestCount(el);
    setSliderFill(el);
    updateTypeCard(type);
  };
  setSliderFill(el);
  el.addEventListener('input', () => sync(false));
  el.addEventListener('change', () => sync(true));
  el.addEventListener('pointerup', () => sync(true));
}

/* ===================== 首页 ===================== */
function renderHome(){
  pageMode = 'home';
  stopTimer();
  document.getElementById('bottomBar').classList.add('hidden');
  document.getElementById('timer').classList.remove('show');
  document.getElementById('btnHome').classList.add('hidden');
  document.getElementById('btnSubmit').classList.remove('hidden');
  document.getElementById('btnSubmit').textContent = '交卷评分';

  const app = document.getElementById('app');

  app.innerHTML = `
  <div class="single-col">
    <div class="home-wrap">

      <div class="home-banner">
        <div class="home-badge"><span class="spark"></span>期末考试复习</div>
        <h2><span class="light">Web 前端技术</span> · 分卷练习</h2>
        <p>三种客观题型<strong>分开组卷</strong>在线练习；编程题单独<strong>复习展示</strong>，对照参考答案自学。拖动滑块自选题量，满分固定 <b>100</b> 分。</p>
      </div>

      <div class="bank-stats">
        <div class="bank-stat bank-stat--choice">
          <div class="bs-name">选择题</div>
          <div class="bs-num">${BANK.choice.length}<span class="bs-unit">题</span></div>
        </div>
        <div class="bank-stat bank-stat--judge">
          <div class="bs-name">判断题</div>
          <div class="bs-num">${BANK.judge.length}<span class="bs-unit">题</span></div>
        </div>
        <div class="bank-stat bank-stat--fill${BANK.fill.length?'':' empty'}">
          <div class="bs-name">填空题</div>
          <div class="bs-num">${BANK.fill.length}<span class="bs-unit">题</span></div>
        </div>
        <div class="bank-stat bank-stat--code${BANK.code.length?'':' empty'}">
          <div class="bs-name">编程题</div>
          <div class="bs-num">${BANK.code.length}<span class="bs-unit">题</span></div>
        </div>
      </div>

      <div class="paper-card">
        <div class="paper-card-head"><span class="h-icon">≡</span>三套练习卷 · 每次只测一种题型</div>
        <div class="paper-items">
          ${EXAM_TYPES.map(t => {
            const max = BANK[t.key].length;
            const val = Math.min(cfg[t.key] || 0, max);
            const pct = max ? (val / max * 100) : 0;
            const per = val ? fmtScore(100 / val) : '—';
            return `<div class="paper-item${max ? '' : ' disabled'}" data-type="${t.key}">
              <span class="paper-tag ${t.key}">${t.tag}</span>
              <div class="paper-item-body">
                <div class="paper-item-title">${t.label}卷</div>
                <div class="paper-item-desc">题库共 <b>${max}</b> 题 · 已选 <b class="cfg-count" data-type="${t.key}">${val}</b> 题</div>
                <div class="type-slider-row">
                  <div class="type-slider-track">
                    <input type="range" class="type-slider type-slider--${t.key}" data-type="${t.key}"
                      min="0" max="${max}" value="${val}" step="any" style="--pct:${pct}%"
                      ${max ? '' : 'disabled'}>
                  </div>
                  <span class="type-slider-val"><span class="cfg-count" data-type="${t.key}">${val}</span> / ${max}</span>
                </div>
                <div class="paper-item-foot">
                  <div class="paper-item-meta"><em class="cfg-count" data-type="${t.key}">${val}</em> 题 · 满分 100 · 每题 <em class="type-summary-per" data-type="${t.key}">${per}</em> 分</div>
                  <button class="start-type-btn" data-type="${t.key}" ${val ? '' : 'disabled'}>开始练习</button>
                </div>
              </div>
            </div>`;
          }).join('')}
          <div class="paper-item paper-item--review${BANK.code.length ? '' : ' disabled'}">
            <span class="paper-tag code">复习</span>
            <div class="paper-item-body">
              <div class="paper-item-title">编程题复习</div>
              <div class="paper-item-desc">题库共 <b>${BANK.code.length}</b> 题 · 展示题目要求与参考答案，<b>不参与在线判分</b></div>
              <div class="paper-item-foot">
                <div class="paper-item-meta">主观编程题 · 对照代码复习</div>
                <button class="start-type-btn start-review-btn" id="btnCodeReview" ${BANK.code.length ? '' : 'disabled'}>进入复习</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  `;

  document.querySelectorAll('.type-slider').forEach(bindTypeSlider);
  document.querySelectorAll('.start-type-btn:not(#btnCodeReview)').forEach(btn => {
    btn.addEventListener('click', () => startExam(btn.dataset.type));
  });
  document.getElementById('btnCodeReview')?.addEventListener('click', () => {
    if(!BANK.code.length) return;
    renderCodeReviewList();
  });
}

/* ===================== 编程题复习 ===================== */
function renderCodeReviewList(){
  pageMode = 'codeReview';
  stopTimer();
  exam = null;
  document.getElementById('bottomBar').classList.add('hidden');
  document.getElementById('timer').classList.remove('show');
  document.getElementById('btnHome').classList.remove('hidden');

  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="single-col">
    <div class="home-wrap">
      <div class="code-review-banner">
        <h2>编程题复习</h2>
        <p>共 ${BANK.code.length} 道老师模拟编程题。点击卡片查看题目要求、效果截图与参考代码，仅供复习，不计分。</p>
      </div>
      <div class="code-review-grid">
        ${BANK.code.map((q,i)=>`
          <div class="code-review-card" data-idx="${i}">
            ${q.img ? `<img src="${escapeHtml(q.img)}" alt="${escapeHtml(q.title)}" loading="lazy">` : ''}
            <div class="body">
              <div class="idx">第 ${i+1} 题</div>
              <div class="name">${escapeHtml(q.title)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  document.querySelectorAll('.code-review-card').forEach(card => {
    card.addEventListener('click', () => renderCodeReviewDetail(+card.dataset.idx));
  });
}

function renderCodeReviewDetail(idx){
  codeReviewIdx = idx;
  const q = BANK.code[idx];
  if(!q) return;

  document.getElementById('bottomBar').classList.remove('hidden');
  document.getElementById('btnSubmit').classList.remove('hidden');
  document.getElementById('btnSubmit').textContent = '返回列表';
  document.getElementById('btnPrev').disabled = idx <= 0;
  document.getElementById('btnNext').disabled = idx >= BANK.code.length - 1;
  document.getElementById('btnPrev').textContent = '← 上一题';
  document.getElementById('btnNext').textContent = '下一题 →';

  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="single-col">
    <div class="qcard code-q">
      <div class="q-meta">
        <span class="q-type-tag code">编程复习</span>
        <span class="q-num">第 ${idx+1} / ${BANK.code.length} 题</span>
      </div>
      <div class="q-title">${escapeHtml(q.title)}</div>
      ${q.img ? `<figure class="code-review-fig"><img src="${escapeHtml(q.img)}" alt="${escapeHtml(q.title)}" loading="lazy"></figure>` : ''}
      <div class="req">${fmtText(q.req||'').replace(/\n/g,'<br>')}</div>
      <div class="code-review-answer">
        <div class="head">参考答案</div>
        ${q.points ? `<div class="points"><b>评分要点：</b>${escapeHtml(q.points)}</div>` : ''}
        <pre class="code-block">${escapeHtml(q.code||'')}</pre>
      </div>
      ${q.e ? `<div class="explain show ok" style="margin-top:16px"><span class="tag">提示</span>${fmtText(q.e)}</div>` : ''}
    </div>
  </div>`;
  smoothScrollToTop();
}

/* ===================== 开始考试 ===================== */
function startExam(typeKey){
  const def = EXAM_TYPES.find(t => t.key === typeKey);
  if(!def) return;
  const max = BANK[typeKey].length;
  const n = Math.min(Math.max(0, Math.round(cfg[typeKey] || 0)), max);
  if(n === 0){
    alert('请至少选择 1 道题');
    return;
  }

  const perScore = 100 / n;
  const questions = sample(BANK[typeKey], n).map(q => ({ ...q, type: typeKey, score: perScore }));

  pageMode = 'exam';
  exam = {
    questions,
    answers: {},
    submitted: false,
    totalScore: 100,
    perScore,
    examType: typeKey,
    examLabel: def.section,
    ranges: [{ label: def.section, start: 0, end: n, score: 100 }]
  };
  currentIdx = 0;
  seconds = 0;

  document.getElementById('bottomBar').classList.remove('hidden');
  document.getElementById('btnHome').classList.remove('hidden');
  document.getElementById('btnSubmit').classList.remove('hidden');
  document.getElementById('btnSubmit').textContent = '交卷评分';
  document.getElementById('timer').classList.add('show');
  startTimer();
  renderExam(true);
  smoothScrollToTop();
}

function buildPanelHTML(){
  const answeredCount = countAnswered();
  const ranges = exam.ranges || [];
  return `
    <div class="answer-panel">
      ${ranges.map(r=>{
        if(r.end<=r.start) return '';
        let cells='';
        for(let i=r.start;i<r.end;i++){
          let cls='panel-cell';
          if(i===currentIdx) cls+=' current';
          else if(exam.submitted){
            if(isCorrect(i)) cls+=' correct';
            else if(isAnswered(i)) cls+=' wrong';
          } else if(exam.questions[i].type==='code' && exam.answers[i]?.viewed) cls+=' viewed';
          else if(isAnswered(i)) cls+=' answered';
          cells += `<div class="${cls}" data-jump="${i}">${i+1}</div>`;
        }
        return `<div class="panel-section">
          <div class="panel-title"><span>${r.label}</span><span class="pt-score">${fmtScore(r.score)} 分</span></div>
          <div class="panel-grid">${cells}</div>
        </div>`;
      }).join('')}
      <div class="panel-summary">
        <div class="row"><span>答题情况</span><b>${answeredCount} / ${exam.questions.length}</b></div>
        <div class="panel-legend">
          <div class="lg"><span class="box unanswered"></span>未答</div>
          <div class="lg"><span class="box answered"></span>已答</div>
          <div class="lg"><span class="box current"></span>当前</div>
        </div>
      </div>
      <button class="panel-submit" id="panelSubmit">${exam.submitted?'查看成绩':'交卷评分'}</button>
    </div>`;
}

function ensureExamShell(){
  if(document.getElementById('examHeader')) return;
  document.getElementById('app').innerHTML = `
    <div class="exam-header" id="examHeader">
      <div class="progress-row">
        <div class="left"></div>
        <div class="right"></div>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-bar-gradient"></div>
        <div class="progress-bar-cover" id="progressCover"></div>
      </div>
    </div>
    <div class="exam-layout">
      <div class="left-col" id="questionCol"></div>
      <div class="right-col" id="panelCol"></div>
    </div>`;
}

function updateProgressUI(){
  if(!exam) return;
  const answeredCount = countAnswered();
  const total = exam.questions.length;
  const pct = total ? answeredCount / total * 100 : 0;
  const left = document.querySelector('#examHeader .progress-row .left');
  const right = document.querySelector('#examHeader .progress-row .right');
  const cover = document.getElementById('progressCover');
  if(left) left.innerHTML = `已答 <b>${answeredCount}</b> / ${total}`;
  if(right) right.innerHTML = `当前第 ${currentIdx+1} 题 · 剩余 ${total - answeredCount} 题`;
  if(cover){
    const remain = 100 - pct;
    cover.style.width = remain + '%';
    if(remain >= 99.9){
      cover.style.webkitMaskImage = 'none';
      cover.style.maskImage = 'none';
    }else if(remain <= 0.1){
      cover.style.width = '0%';
    }else{
      cover.style.webkitMaskImage = 'linear-gradient(to right,transparent 0,#000 32px)';
      cover.style.maskImage = 'linear-gradient(to right,transparent 0,#000 32px)';
    }
  }
  const sumB = document.querySelector('.panel-summary .row b');
  if(sumB) sumB.textContent = `${answeredCount} / ${total}`;
}

function bindPanelEvents(){
  document.querySelectorAll('.panel-cell').forEach(el=>{
    el.addEventListener('click',()=>{
      const jump = +el.dataset.jump;
      if(jump === currentIdx) return;
      currentIdx = jump;
      renderExam(false);
      smoothScrollToTop();
    });
  });
  const ps = document.getElementById('panelSubmit');
  if(ps) ps.addEventListener('click', submitExam);
}

/* ===================== 渲染答题页 ===================== */
function renderExam(resetShell){
  if(!exam) return;
  const q = exam.questions[currentIdx];

  if(resetShell || !document.getElementById('examHeader')){
    ensureExamShell();
  }

  updateProgressUI();

  document.getElementById('questionCol').innerHTML = `<div class="qcard">${renderQuestion(q, currentIdx)}</div>`;
  document.getElementById('panelCol').innerHTML = buildPanelHTML();

  bindQuestionEvents(q, currentIdx);
  bindPanelEvents();

  document.getElementById('btnPrev').disabled = currentIdx===0;
  document.getElementById('btnNext').disabled = currentIdx===exam.questions.length-1;
  document.getElementById('btnSubmit').textContent = exam.submitted ? '查看成绩' : '交卷评分';
}

function countAnswered(){
  let n=0;
  exam.questions.forEach((_,i)=>{ if(isAnswered(i)) n++; });
  return n;
}
function handleBottomSubmit(){
  if(pageMode === 'codeReview') renderCodeReviewList();
  else submitExam();
}
function submitExam(){
  if(!exam.submitted){
    const unanswered = exam.questions.filter((_,i)=>!isAnswered(i)).length;
    if(unanswered>0){
      if(!confirm(`还有 ${unanswered} 题未作答，确定要交卷吗？`)) return;
    }
    exam.submitted = true;
    stopTimer();
  }
  renderResult();
}

function renderQuestion(q,idx,options={}){
  const hideMeta = options.hideMeta;
  const reviewMode = options.reviewMode;
  const typeMap = {choice:'选择题',judge:'判断题',fill:'填空题',code:'编程题'};
  let meta = hideMeta ? '' : `
    <div class="q-meta">
      <span class="q-type-tag ${q.type}">${typeMap[q.type]}</span>
      <span class="q-score">${fmtScore(q.score)} 分</span>
      <span class="q-num-big">第 <b>${idx+1}</b> 题 / 共 ${exam.questions.length} 题</span>
    </div>
  `;
  let body = '';
  const ans = exam.answers[idx];
  const submitted = exam.submitted;

  if(q.type==='choice'){
    const v = ans?.value;
    body = `<div class="q-title">${fmtText(q.q)}</div><div class="options">`;
    q.opts.forEach((o,j)=>{
      let cls='option';
      if(v===j) cls+=' selected';
      if(submitted){
        if(j===q.a) cls+=' correct';
        else if(v===j) cls+=' wrong';
        cls+=' disabled';
      }
      body += `<div class="${cls}" data-o="${j}"><span class="letter">${String.fromCharCode(65+j)}</span><span>${fmtOption(o)}</span></div>`;
    });
    body += `</div>`;
    if(submitted){
      const ok = v===q.a;
      body += `<div class="explain show ${ok?'ok':'no'}"><span class="tag">${ok?'✔ 回答正确':'✘ 正确答案：'+String.fromCharCode(65+q.a)}</span>${fmtText(q.e)}</div>`;
    }
  }
  else if(q.type==='judge'){
    const v = ans?.value;
    body = `<div class="q-title">${fmtText(q.q)}</div><div class="judge-btns">`;
    [true,false].forEach(b=>{
      let cls='judge-btn';
      if(v===b) cls+=' selected';
      if(submitted){
        if(b===q.a) cls+=' correct';
        else if(v===b) cls+=' wrong';
        cls+=' disabled';
      }
      body += `<button class="${cls}" data-v="${b}"><span class="icon">${b?'√':'×'}</span><span>${b?'正确':'错误'}</span></button>`;
    });
    body += `</div>`;
    if(submitted){
      const ok = v===q.a;
      body += `<div class="explain show ${ok?'ok':'no'}"><span class="tag">${ok?'✔ 回答正确':'✘ 正确答案：'+(q.a?'√ 正确':'× 错误')}</span>${fmtText(q.e)}</div>`;
    }
  }
  else if(q.type==='fill'){
    const codeHtml = escapeHtml(q.code).replace(/______/g,'<span class="blank">______</span>');
    const fb = ans?.value || {};
    body = `${q.title ? `<div class="q-title">${escapeHtml(q.title)}</div>` : ''}
            ${renderFillFigures(q)}
            <div class="fill-desc">${escapeHtml(q.desc||'请补全下方代码中的空缺部分。')}</div>
            <pre class="code-block">${codeHtml}</pre>
            <div class="blank-list">`;
    q.blanks.forEach((b,j)=>{
      const val = fb[j]||'';
      let cls='blank-item';
      if(submitted){
        const ok = norm(val)===norm(b.a);
        cls += ok?' ok':' no';
      }
      body += `<div class="${cls}"><span class="lab">空 ${j+1}</span><input data-b="${j}" value="${escapeHtml(val)}" placeholder="..." ${submitted?'disabled':''}></div>`;
    });
    body += `</div>`;
    if(submitted){
      let okCount=0;
      q.blanks.forEach((b,j)=>{ if(norm(fb[j])===norm(b.a)) okCount++; });
      const allOk = okCount===q.blanks.length;
      const gotScore = getQuestionScore(idx);
      const tag = allOk
        ? `✔ 全部正确 · 得 ${fmtScore(q.score)} 分`
        : (okCount>0 ? `◉ 部分正确 ${okCount}/${q.blanks.length} · 得 ${fmtScore(gotScore)}/${fmtScore(q.score)} 分` : `✘ 全部错误 · 得 0/${fmtScore(q.score)} 分`);
      const cls = allOk ? 'ok' : (okCount>0 ? 'ok' : 'no');
      const blankAns = q.blanks.map((b,j)=>`空${j+1} = <code style="background:rgba(255,255,255,.6);padding:1px 6px;border-radius:3px;font-family:SF Mono,Consolas,monospace">${escapeHtml(b.a)}</code>`).join('，');
      const blankExplain = q.blanks.map((b,j)=> b.e ? `空${j+1}：${fmtText(b.e)}` : '').filter(Boolean).join('<br>');
      let explainDetail = '';
      if(q.e) explainDetail += fmtText(q.e);
      if(blankExplain) explainDetail += (explainDetail ? '<br><br>' : '') + blankExplain;
      body += `<div class="explain show ${cls}"><span class="tag">${tag}</span>参考答案：${blankAns}${explainDetail ? `<div class="explain-detail">${explainDetail}</div>` : ''}</div>`;
    }
  }
  else if(q.type==='code'){
    const expand = submitted || reviewMode;
    body = `<div class="q-title">${escapeHtml(q.title||'编程题')}</div>
            <div class="req">${fmtText(q.req||'').replace(/\n/g,'<br>')}</div>
            ${expand ? '' : '<button class="answer-toggle" id="ansTog">显示参考答案 <span class="arrow">▼</span></button>'}
            <div class="code-answer${expand?' show':''}" id="codeAns">
              <div class="head">参考答案（编程题为主观题，请对照评分要点自评）</div>
              <div class="points"><b>评分要点：</b>${escapeHtml(q.points||'')}</div>
              <pre class="code-block">${escapeHtml(q.code||'')}</pre>
              ${q.e ? `<div class="explain show ok" style="margin-top:12px"><span class="tag">解析</span>${fmtText(q.e)}</div>` : ''}
            </div>`;
  }

  return meta + body;
}

function renderReviewItem(idx, q, partial){
  const typeMap = {choice:'选择题', judge:'判断题', fill:'填空题', code:'编程题'};
  const scoreTag = (partial > 0 && partial < q.score)
    ? ` · 得 ${fmtScore(partial)} / ${fmtScore(q.score)} 分`
    : ` · 0 / ${fmtScore(q.score)} 分`;
  return `<div class="review-item">
    <div class="ri-head"><span class="t">第 ${idx+1} 题 · ${typeMap[q.type] || q.type}${scoreTag}</span></div>
    <div class="review-qcard qcard">${renderQuestion(q, idx, { hideMeta: true, reviewMode: true })}</div>
  </div>`;
}

/* ===================== 答案判定 ===================== */
function isAnswered(idx){
  const q = exam.questions[idx];
  const a = exam.answers[idx];
  if(!a) return false;
  if(q.type==='choice') return a.value!=null;
  if(q.type==='judge') return a.value!=null;
  if(q.type==='fill') return a.value && Object.keys(a.value).length>0;
  if(q.type==='code') return !!a.viewed;
  return false;
}
function isCorrect(idx){
  const q = exam.questions[idx];
  const a = exam.answers[idx];
  if(!a) return false;
  if(q.type==='choice') return a.value===q.a;
  if(q.type==='judge') return a.value===q.a;
  if(q.type==='fill'){
    let ok=true;
    q.blanks.forEach((b,j)=>{ if(norm(a.value?.[j])!==norm(b.a)) ok=false; });
    return ok;
  }
  return false;
}
// 计算单题实际得分（填空题按空数比例给分，结果保留 1 位小数）
function getQuestionScore(idx){
  const q = exam.questions[idx];
  const a = exam.answers[idx];
  if(q.type==='choice') return a?.value===q.a ? q.score : 0;
  if(q.type==='judge')  return a?.value===q.a ? q.score : 0;
  if(q.type==='fill'){
    if(!a?.value) return 0;
    let correctCount = 0;
    q.blanks.forEach((b,j)=>{ if(norm(a.value[j])===norm(b.a)) correctCount++; });
    if(q.blanks.length===0) return 0;
    if(correctCount===q.blanks.length) return q.score;
    return q.score * correctCount / q.blanks.length;
  }
  return 0;
}

/* ===================== 事件绑定 ===================== */
function bindQuestionEvents(q,idx){
  if(q.type==='choice'){
    document.querySelectorAll('.option:not(.disabled)').forEach(el=>{
      el.addEventListener('click',()=>{
        if(exam.submitted) return;
        const o=+el.dataset.o;
        if(!exam.answers[idx]) exam.answers[idx]={};
        exam.answers[idx].value = o;
        // 只更新当前题选项高亮，不重新渲染整个页面
        document.querySelectorAll('.options .option').forEach(opt=>opt.classList.remove('selected'));
        el.classList.add('selected');
        syncPanelCell(idx);
        syncProgress();
      });
    });
  }
  else if(q.type==='judge'){
    document.querySelectorAll('.judge-btn:not(.disabled)').forEach(el=>{
      el.addEventListener('click',()=>{
        if(exam.submitted) return;
        const v=el.dataset.v==='true';
        if(!exam.answers[idx]) exam.answers[idx]={};
        exam.answers[idx].value = v;
        document.querySelectorAll('.judge-btns .judge-btn').forEach(b=>b.classList.remove('selected'));
        el.classList.add('selected');
        syncPanelCell(idx);
        syncProgress();
      });
    });
  }
  else if(q.type==='fill'){
    document.querySelectorAll('.blank-item input').forEach(el=>{
      el.addEventListener('input',()=>{
        if(exam.submitted) return;
        if(!exam.answers[idx]) exam.answers[idx]={value:{}};
        exam.answers[idx].value[+el.dataset.b] = el.value;
      });
      el.addEventListener('change',()=>{
        if(exam.submitted) return;
        syncPanelCell(idx);
        syncProgress();
      });
    });
  }
  else if(q.type==='code'){
    const tog = document.getElementById('ansTog');
    const ans = document.getElementById('codeAns');
    tog.addEventListener('click',()=>{
      ans.classList.toggle('show');
      tog.classList.toggle('open');
      tog.firstChild.textContent = ans.classList.contains('show')?'隐藏参考答案 ':'显示参考答案 ';
      if(!exam.answers[idx]) exam.answers[idx]={};
      exam.answers[idx].viewed = true;
      syncPanelCell(idx);
      syncProgress();
    });
  }
}

// 同步右栏答题卡单个格子状态
function syncPanelCell(idx){
  const cell = document.querySelector(`.panel-cell[data-jump="${idx}"]`);
  if(!cell) return;
  cell.classList.remove('answered','correct','wrong','viewed');
  if(exam.submitted){
    if(isCorrect(idx)) cell.classList.add('correct');
    else if(isAnswered(idx)) cell.classList.add('wrong');
  } else if(exam.questions[idx].type==='code' && exam.answers[idx]?.viewed){
    cell.classList.add('viewed');
  } else if(isAnswered(idx)){
    cell.classList.add('answered');
  }
}
// 同步顶部进度与答题卡统计（不重建进度条 DOM）
function syncProgress(){
  updateProgressUI();
}

/* ===================== 上下题 / 交卷 ===================== */
document.getElementById('btnPrev').addEventListener('click',()=>{
  if(pageMode === 'codeReview'){
    if(codeReviewIdx > 0) renderCodeReviewDetail(codeReviewIdx - 1);
    return;
  }
  if(currentIdx>0){currentIdx--;renderExam(false);smoothScrollToTop();}
});
document.getElementById('btnNext').addEventListener('click',()=>{
  if(pageMode === 'codeReview'){
    if(codeReviewIdx < BANK.code.length - 1) renderCodeReviewDetail(codeReviewIdx + 1);
    return;
  }
  if(currentIdx<exam.questions.length-1){currentIdx++;renderExam(false);smoothScrollToTop();}
});
document.getElementById('btnSubmit').addEventListener('click', handleBottomSubmit);
document.getElementById('btnHome').addEventListener('click',()=>{
  if(pageMode === 'codeReview'){
    renderHome();
    return;
  }
  if(exam && !exam.submitted){
    if(!confirm('当前测试尚未交卷，返回首页将丢失作答，确定吗？')) return;
  }
  renderHome();
});

/* ===================== 结果页 ===================== */
function renderResult(){
  let score=0, wrongList=[], correctCount=0;
  exam.questions.forEach((q,i)=>{
    const s = getQuestionScore(i);
    score += s;
    if(isCorrect(i)){
      correctCount++;
    } else {
      wrongList.push({idx:i,q,partial:s});
    }
  });
  score = Math.round(score);
  const totalAuto = exam.totalScore;
  const pass = score >= totalAuto*0.6;

  const app = document.getElementById('app');
  document.getElementById('bottomBar').classList.add('hidden');

  const min = String(Math.floor(seconds/60)).padStart(2,'0');
  const sec = String(seconds%60).padStart(2,'0');
  const pct = totalAuto>0 ? Math.round(score/totalAuto*100) : 0;
  const ringDeg = pct*3.6;

  app.innerHTML = `
  <div class="single-col">
    <div class="result-hero ${pass?'':'fail'}">
      <div class="score-ring" style="background:conic-gradient(${pass?'var(--success)':'var(--danger)'} ${ringDeg}deg, var(--bg-soft) ${ringDeg}deg)">
        <div class="num">${score}<span style="font-size:18px;color:var(--text-muted)">/${totalAuto}</span></div>
      </div>
      <h2>${pass?'恭喜通过！':'再接再厉'}</h2>
      <div class="tip">得分率 ${pct}% · 用时 ${min}:${sec} · 共 ${exam.questions.length} 题 · 满分 ${totalAuto} 分</div>
      <div class="result-stats">
        <div class="result-stat"><div class="n">${exam.questions.length}</div><div class="l">总题数</div></div>
        <div class="result-stat"><div class="n" style="color:var(--success)">${correctCount}</div><div class="l">完全答对</div></div>
        <div class="result-stat"><div class="n" style="color:var(--danger)">${wrongList.length}</div><div class="l">有错/未答</div></div>
        <div class="result-stat"><div class="n">${min}:${sec}</div><div class="l">用时</div></div>
      </div>
      <div class="result-actions">
        <button class="start-btn" id="btnRetry">再来一组</button>
        <button class="nav-btn" id="btnReview">查看错题</button>
      </div>
    </div>

    ${wrongList.length?`
    <div class="review-section" id="reviewSec" style="display:none">
      <h3>错题回顾（共 ${wrongList.length} 题）</h3>
      ${wrongList.map(({idx,q,partial})=>renderReviewItem(idx,q,partial)).join('')}
    </div>`:''}
  </div>
  `;

  document.getElementById('btnRetry').addEventListener('click',()=>{renderHome();});
  const rv = document.getElementById('btnReview');
  if(rv) rv.addEventListener('click',()=>{
    const sec = document.getElementById('reviewSec');
    if(sec){
      sec.style.display='';
      rv.textContent='返回顶部';
      sec.scrollIntoView({behavior:'smooth', block:'start'});
      rv.onclick=()=>smoothScrollToTop();
    }
  });
}

/* ===================== 计时器 ===================== */
function startTimer(){
  stopTimer();
  timerId = setInterval(()=>{
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timerText').textContent = `${m}:${s}`;
  },1000);
}
function stopTimer(){ if(timerId){clearInterval(timerId);timerId=null;} }

/* ===================== 启动 ===================== */
renderHome();
</script>
